<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>去哪玩？投票小程序</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .vote-info { background: #f0f4ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .vote-info p { color: #555; font-size: 14px; margin: 5px 0; }
        .vote-info strong { color: #667eea; }
        .loading { text-align: center; padding: 40px; color: #667eea; font-size: 18px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input[type="text"] { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        .options { display: grid; gap: 12px; }
        .option { display: flex; align-items: center; padding: 15px; background: #f8f9fa; border-radius: 10px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .option:hover { background: #eef1ff; }
        .option.selected { border-color: #667eea; background: #f0f4ff; }
        .option input { display: none; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #ddd; border-radius: 6px; margin-right: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
        .option.selected .checkbox { background: #667eea; border-color: #667eea; }
        .checkbox::after { content: '✓'; color: white; font-weight: bold; display: none; }
        .option.selected .checkbox::after { display: block; }
        .option-text { flex: 1; color: #333; font-size: 16px; }
        .other-input { display: none; margin-top: 10px; width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .option.selected.other .other-input { display: block; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; margin-top: 20px; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .error { color: #e74c3c; font-size: 14px; margin-top: 10px; text-align: center; }
        .success { background: #d4edda; color: #155724; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
        .success h3 { color: #28a745; margin-bottom: 10px; }
        .admin-link { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ddd; }
        .admin-link button { background: none; border: none; color: #999; cursor: pointer; font-size: 12px; }
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .admin-modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 400px; width: 90%; }
        .admin-modal h3 { margin-bottom: 20px; text-align: center; }
        .admin-modal input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; margin-bottom: 15px; font-size: 16px; }
        .admin-modal .btn-group { display: flex; gap: 10px; }
        .admin-modal .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .admin-modal .btn-ok { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .admin-modal .btn-cancel { background: #f0f0f0; color: #666; }
        .admin-results { display: none; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .result-item { margin-bottom: 15px; }
        .result-bar { height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .result-fill { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; transition: width 0.5s; }
        .vote-detail { padding: 10px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; }
        .export-btn { margin-top: 20px; padding: 12px 30px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .refresh-btn { margin-top: 10px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 去哪玩？投票</h1>
        <p class="subtitle">快来选出你想去的地方吧！</p>
        
        <div class="vote-info">
            <p>📋 <strong>规则</strong>：每人最多可投 <strong>2 票</strong></p>
            <p>✏️ 选择"其他"需要填写具体地点</p>
            <p id="loadingStatus" class="loading">🔄 加载中...</p>
        </div>

        <form id="voteForm" style="display: none;">
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="nickname" placeholder="请输入你的昵称" required>
            </div>

            <div class="form-group">
                <label>请选择想去的地方（最多 2 个）</label>
                <div class="options" id="options"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">提交投票</button>
            <p class="error" id="errorMsg"></p>
        </form>

        <div id="successMsg" class="success" style="display: none;"></div>

        <div class="admin-link">
            <button onclick="showAdminLogin()">管理员查看结果</button>
        </div>

        <div id="adminLogin" class="admin-modal">
            <div class="admin-modal-content">
                <h3>🔐 管理员登录</h3>
                <input type="password" id="adminPassword" placeholder="请输入管理员密码">
                <div class="btn-group">
                    <button class="btn-ok" onclick="checkAdmin()">登录</button>
                    <button class="btn-cancel" onclick="closeAdminLogin()">取消</button>
                </div>
                <p id="adminError" style="color: #e74c3c; font-size: 14px; margin-top: 10px; text-align: center;"></p>
            </div>
        </div>

        <div id="adminResults" class="admin-results">
            <h3 style="margin-bottom: 20px;">🔐 管理员专属 - 详细投票数据</h3>
            <div id="adminResultsContent"></div>
            <button class="export-btn" onclick="exportData()">📥 导出 Excel</button>
            <button class="refresh-btn" onclick="showAdminResults()">🔄 刷新数据</button>
        </div>
    </div>

    <!-- 配置文件 -->
    <script src="config.js"></script>
    
    <script>
        const voteOptions = [
            "广州融创体育世界",
            "东莞轰趴（烧烤、越野车、露营）",
            "疯狂的麦咭",
            "汤泉足道水会",
            "广东千古情 + 顺德吃好吃的",
            "其他"
        ];

        const ADMIN_PASSWORD = "M123654";
        
        // GitHub 配置从 config.js 加载
        
        let selectedOptions = [];
        let voterId = null;
        let votes = [];

        // 获取用户 ID
        function getVoterId() {
            let id = localStorage.getItem('voterId');
            if (!id) {
                id = 'user_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('voterId', id);
            }
            return id;
        }

        // 从 GitHub 获取投票数据
        async function fetchVotes() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/votes.json`,
                    {
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (response.status === 404) {
                    votes = [];
                    return true;
                }
                
                const data = await response.json();
                const content = atob(data.content);
                votes = JSON.parse(content);
                return true;
            } catch (error) {
                console.error('获取数据失败:', error);
                votes = [];
                return false;
            }
        }

        // 保存投票到 GitHub
        async function saveVotes() {
            try {
                // 先获取最新的 sha
                const getResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/votes.json`,
                    {
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                let sha = null;
                if (getResponse.status === 200) {
                    const getData = await getResponse.json();
                    sha = getData.sha;
                }
                
                // 更新文件
                const body = {
                    message: 'Update votes',
                    content: btoa(JSON.stringify(votes, null, 2)),
                    ...(sha && { sha })
                };
                
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/votes.json`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    }
                );
                
                return response.ok;
            } catch (error) {
                console.error('保存数据失败:', error);
                return false;
            }
        }

        // 检查是否已投票
        function hasVoted() {
            return votes.some(v => v.voterId === voterId);
        }

        // 获取投票记录
        function getUserVote() {
            return votes.find(v => v.voterId === voterId);
        }

        // 初始化
        async function init() {
            voterId = getVoterId();
            
            const container = document.getElementById('options');
            container.innerHTML = voteOptions.map(opt => {
                const isOther = opt === '其他';
                return `
                    <div class="option" data-option="${opt}" onclick="toggleOption(this)">
                        <div class="checkbox"></div>
                        <span class="option-text">${opt}</span>
                        ${isOther ? '<input type="text" class="other-input" placeholder="请填写具体地点" onclick="event.stopPropagation()">' : ''}
                    </div>
                `;
            }).join('');

            const success = await fetchVotes();
            document.getElementById('loadingStatus').style.display = 'none';
            
            if (!success) {
                document.getElementById('loadingStatus').textContent = '⚠️ 请配置 GitHub Token（见页面底部说明）';
                document.getElementById('loadingStatus').style.color = '#e74c3c';
                return;
            }

            document.getElementById('voteForm').style.display = 'block';
            
            if (hasVoted()) {
                const vote = getUserVote();
                if (vote) {
                    document.getElementById('voteForm').style.display = 'none';
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('successMsg').innerHTML = `
                        <h3>✅ 您已投票</h3>
                        <p>您的选择：${vote.choices.map(c => c.value).join('、')}</p>
                        <p style="font-size: 12px; color: #999; margin-top: 10px;">每人只能投票一次哦～</p>
                    `;
                }
            }
            updateButton();
        }

        // 切换选项
        function toggleOption(element) {
            const option = element.dataset.option;
            
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedOptions = selectedOptions.filter(o => o.name !== option);
            } else {
                if (selectedOptions.length >= 2) {
                    showError('最多只能选择 2 个选项哦！');
                    return;
                }
                if (selectedOptions.some(o => o.name === option)) {
                    showError('不能重复选择同一项目哦！');
                    return;
                }
                element.classList.add('selected');
                if (option === '其他') {
                    const val = element.querySelector('.other-input').value.trim();
                    selectedOptions.push({ name: option, value: val || '待填写' });
                } else {
                    selectedOptions.push({ name: option, value: option });
                }
            }
            updateButton();
            clearError();
        }

        // 更新按钮状态
        function updateButton() {
            document.getElementById('submitBtn').disabled = selectedOptions.length === 0;
        }

        // 错误提示
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
        }

        function clearError() {
            document.getElementById('errorMsg').textContent = '';
        }

        // 验证其他选项
        function validateOther() {
            const otherOpt = document.querySelector('.option.selected.other');
            if (otherOpt) {
                const otherInput = otherOpt.querySelector('.other-input');
                if (!otherInput.value.trim()) {
                    showError('选择"其他"需要填写具体地点哦！');
                    return false;
                }
                const idx = selectedOptions.findIndex(o => o.name === '其他');
                if (idx !== -1) {
                    selectedOptions[idx].value = otherInput.value.trim();
                }
            }
            return true;
        }

        // 提交投票
        document.getElementById('voteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                showError('请填写昵称哦！');
                return;
            }

            if (selectedOptions.length === 0) {
                showError('请至少选择 1 个选项！');
                return;
            }

            if (!validateOther()) {
                return;
            }

            // 再次检查是否已投票
            await fetchVotes();
            if (hasVoted()) {
                showError('您已经投过票了！');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            votes.push({
                voterId: voterId,
                nickname: nickname,
                choices: selectedOptions,
                timestamp: new Date().toISOString()
            });

            const success = await saveVotes();
            
            if (success) {
                document.getElementById('voteForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('successMsg').innerHTML = `
                    <h3>✅ 投票成功！</h3>
                    <p>感谢你的参与～</p>
                    <p style="font-size: 12px; color: #999; margin-top: 10px;">每人只能投票一次，不能更改哦</p>
                `;
            } else {
                showError('提交失败，请重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '提交投票';
            }
        });

        // 监听其他输入
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('other-input')) {
                const idx = selectedOptions.findIndex(o => o.name === '其他');
                if (idx !== -1) {
                    selectedOptions[idx].value = e.target.value.trim() || '待填写';
                }
            }
        });

        // 管理员功能
        function showAdminLogin() {
            document.getElementById('adminLogin').style.display = 'flex';
        }

        function closeAdminLogin() {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminError').textContent = '';
        }

        function checkAdmin() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                closeAdminLogin();
                showAdminResults();
            } else {
                document.getElementById('adminError').textContent = '密码错误！';
            }
        }

        async function showAdminResults() {
            document.getElementById('adminResultsContent').innerHTML = '<p class="loading">🔄 加载中...</p>';
            
            await fetchVotes();
            
            let detailHTML = '<h4 style="margin: 20px 0 15px;">📋 投票明细</h4><div style="max-height: 400px; overflow-y: auto;">';
            votes.forEach((vote, i) => {
                detailHTML += `
                    <div class="vote-detail">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>#${i + 1} ${vote.nickname}</strong>
                            <span style="color: #999; font-size: 12px;">${new Date(vote.timestamp).toLocaleString('zh-CN')}</span>
                        </div>
                        <div style="color: #667eea; margin-top: 5px;">${vote.choices.map(c => c.value).join('、')}</div>
                    </div>
                `;
            });
            detailHTML += '</div>';

            const results = {};
            votes.forEach(vote => {
                vote.choices.forEach(choice => {
                    results[choice.value] = (results[choice.value] || 0) + 1;
                });
            });

            const total = Object.values(results).reduce((a, b) => a + b, 0);
            const sorted = Object.entries(results).sort((a, b) => b[1] - a[1]);

            let statsHTML = '<h4 style="margin: 20px 0 15px;">📊 统计结果</h4>';
            sorted.forEach(([name, count]) => {
                const pct = total > 0 ? (count / total * 100) : 0;
                statsHTML += `
                    <div class="result-item">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${name}</strong>
                            <span>${count}票 (${pct.toFixed(1)}%)</span>
                        </div>
                        <div class="result-bar"><div class="result-fill" style="width: ${pct}%"></div></div>
                    </div>
                `;
            });

            let summaryHTML = `
                <div style="background: #f0f4ff; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                    <p><strong>总投票人数:</strong> ${votes.length} 人</p>
                    <p><strong>总票数:</strong> ${total} 票</p>
                    <p><strong>人均投票:</strong> ${total > 0 ? (total / votes.length).toFixed(2) : 0} 票</p>
                </div>
            `;

            document.getElementById('adminResultsContent').innerHTML = summaryHTML + statsHTML + detailHTML;
            document.getElementById('adminResults').style.display = 'block';
        }

        function exportData() {
            let csv = '序号，昵称，选择 1，选择 2，投票时间\n';
            votes.forEach((vote, i) => {
                const choices = vote.choices.map(c => c.value).join(';');
                csv += `${i + 1},"${vote.nickname}","${choices}","${vote.timestamp}"\n`;
            });

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `投票数据_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.csv`;
            link.click();
        }

        // 启动
        init();
    </script>
</body>
</html>
